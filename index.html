<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Service</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white">

<div class="max-w-2xl mx-auto p-6 mt-10">

<h1 class="text-3xl font-bold text-center mb-8">
🚗 Auto Service Buyurtma
</h1>

<form id="orderForm" class="space-y-4 bg-slate-900 p-6 rounded-xl">

<input name="ism" placeholder="Ism" class="w-full p-3 bg-slate-800 rounded">

<input name="familiya" placeholder="Familiya" class="w-full p-3 bg-slate-800 rounded">

<input name="raqam" placeholder="Telefon raqam" class="w-full p-3 bg-slate-800 rounded">

<textarea name="izoh" placeholder="Izoh" class="w-full p-3 bg-slate-800 rounded"></textarea>

<button class="w-full bg-yellow-500 text-black font-bold p-3 rounded">
Yuborish
</button>

<p id="msg" class="text-center mt-3"></p>

</form>

</div>

<script>

const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_URL";

document.getElementById("orderForm")
.addEventListener("submit", async (e) => {

e.preventDefault();

const form = e.target;

const data = {
ism: form.ism.value,
familiya: form.familiya.value,
raqam: form.raqam.value,
izoh: form.izoh.value
};

document.getElementById("msg").innerText =
"Yuborilmoqda...";

try {

const res = await fetch(SCRIPT_URL, {
method: "POST",
body: JSON.stringify(data)
});

const json = await res.json();

if(json.success){
document.getElementById("msg").innerText =
"✅ Buyurtma yuborildi!";
form.reset();
}else{
document.getElementById("msg").innerText =
"❌ Xatolik";
}

} catch(err){
document.getElementById("msg").innerText =
"❌ Server error";
}

});

</script>

</body>
</html>
